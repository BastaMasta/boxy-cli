name: BuildTests

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: boxy-cli

      - name: Build library
        run: |
          cd boxy-cli
          cargo build --verbose

      - name: Test library
        run: |
          cd boxy-cli
          cargo test --verbose

      - name: Format check
        run: |
          cd boxy-cli
          cargo fmt --check

      - name: Clippy
        run: |
          cd boxy-cli
          cargo clippy -- -D warnings

      - name: Security audit
        run: |
          cargo install cargo-audit --quiet
          cd boxy-cli
          cargo audit

  build-binary:
    needs: build-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: binary-testing

      - name: Build and run binary tests
        run: |
          cd binary-testing
          cargo test --verbose

  test-docs:
    needs: build-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: boxy-cli

      - name: Compile docs
        run: |
          cd boxy-cli
          cargo doc --no-deps
